<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无畏契约·通行证代练费用计算器 | 新阶梯费率</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
        }

        /* 极简卡片 */
        .minimal-card {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 28px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FF8C42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .sub {
            font-size: 0.75rem;
            color: #7e8aa8;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .input-field {
            margin-bottom: 28px;
        }
        .input-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5f0;
            letter-spacing: 0.3px;
        }
        .level-input {
            width: 100%;
            background: #030814;
            border: 1.5px solid #2d374e;
            border-radius: 44px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #F3F4FF;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', monospace;
        }
        .level-input:focus {
            border-color: #FF8C42;
            box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.2);
        }
        .hint {
            font-size: 0.7rem;
            color: #6b779b;
            margin-top: 6px;
            margin-left: 14px;
        }

        .cost-area {
            background: #01051640;
            border-radius: 48px;
            padding: 24px 20px;
            margin: 24px 0 20px;
            text-align: center;
            border: 1px solid rgba(255, 200, 120, 0.25);
        }
        .cost-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9aa4c9;
        }
        .cost-number {
            font-size: 3.8rem;
            font-weight: 800;
            margin: 8px 0;
            color: #FFD966;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
            line-height: 1.1;
            font-family: 'Inter', monospace;
        }
        .cost-unit {
            font-size: 1.2rem;
            font-weight: 500;
            color: #c0b38c;
        }

        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            background: #1f2a48;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #eef3ff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(95deg, #FF8C42, #E64C2E);
            box-shadow: 0 6px 12px rgba(230, 76, 46, 0.25);
            color: white;
        }
        .btn-primary:hover {
            transform: scale(0.97);
            filter: brightness(1.03);
        }
        .btn-secondary {
            background: #252f4a;
            border: 1px solid #404b6e;
        }
        .btn-secondary:hover {
            background: #2f3b5c;
        }

        .error-msg {
            font-size: 0.7rem;
            color: #FF8A6C;
            text-align: center;
            margin-top: 18px;
            min-height: 32px;
        }

        .micro-note {
            text-align: center;
            font-size: 0.65rem;
            color: #576180;
            margin-top: 24px;
            padding-top: 12px;
            border-top: 1px solid #20273f;
            line-height: 1.5;
        }

        @media (max-width: 460px) {
            .minimal-card {
                padding: 24px 20px 32px;
            }
            .cost-number {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
<div class="minimal-card">
    <div class="header">
        <h2>◈ 无畏契约 · 通行证</h2>
        <div class="sub">代练费用计算 · 纯单级阶梯价（无全包）</div>
    </div>

    <!-- 起始等级 -->
    <div class="input-field">
        <div class="input-label">
            <span>🎯 起始等级</span>
            <span>1 ~ 55</span>
        </div>
        <input type="number" id="startLevel" class="level-input" value="1" min="1" max="55" step="1">
        <div class="hint">※ 最低1级，最高55级</div>
    </div>

    <!-- 目标等级 -->
    <div class="input-field">
        <div class="input-label">
            <span>🏆 目标等级</span>
            <span>须 ≥ 起始等级</span>
        </div>
        <input type="number" id="targetLevel" class="level-input" value="55" min="1" max="55" step="1">
        <div class="hint">※ 目标等级不能低于起始等级</div>
    </div>

    <!-- 最终费用核心区 -->
    <div class="cost-area">
        <div class="cost-label">最终代练费用</div>
        <div class="cost-number"><span id="totalPrice">0.00</span><span class="cost-unit"> 元</span></div>
    </div>

    <div class="button-group">
        <button class="btn btn-primary" id="calcBtn">✨ 计算费用 ✨</button>
        <button class="btn btn-secondary" id="resetBtn">⟳ 重置</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>

    <div class="micro-note">
        💰 <strong>当前阶梯价格（单级）</strong><br>
        1-10级：¥0.5/级 &nbsp;|&nbsp; 11-20级：¥1.0/级 &nbsp;|&nbsp; 21-30级：¥1.5/级<br>
        31-40级：¥2.5/级 &nbsp;|&nbsp; 41-50级：¥3.0/级 &nbsp;|&nbsp; 51-55级：¥4.0/级<br>
        📌 按实际升级等级数量 × 对应区间单价累加，无任何全包套餐。
    </div>
</div>

<script>
    // ---------- 定价数据 (纯单级，无全包) ----------
    const TIERS = [
        { start: 1, end: 10, unitPrice: 0.5 },
        { start: 11, end: 20, unitPrice: 1.0 },
        { start: 21, end: 30, unitPrice: 1.5 },
        { start: 31, end: 40, unitPrice: 2.5 },
        { start: 41, end: 50, unitPrice: 3.0 },
        { start: 51, end: 55, unitPrice: 4.0 }
    ];

    // DOM 元素
    const startInput = document.getElementById('startLevel');
    const targetInput = document.getElementById('targetLevel');
    const totalSpan = document.getElementById('totalPrice');
    const errorDiv = document.getElementById('errorMsg');
    const calcBtn = document.getElementById('calcBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 辅助清除错误
    function setError(msg) {
        errorDiv.innerText = msg;
        totalSpan.innerText = '—';
    }
    function clearError() {
        errorDiv.innerText = '';
    }

    /**
     * 纯单级累加计费（无任何全包/套餐）
     * 根据起始等级和目标等级，遍历每个区间，计算需要升级的等级数量，乘以对应单价后累加。
     * @param {number} startLev 起始等级 (1-55)
     * @param {number} targetLev 目标等级 (1-55, targetLev >= startLev)
     * @returns {number} 总费用
     */
    function computePureUnitPrice(startLev, targetLev) {
        if (startLev === targetLev) return 0;
        if (startLev > targetLev) return -1;
        
        let totalCost = 0;
        
        for (const tier of TIERS) {
            // 当前区间与所需等级范围 [startLev, targetLev] 的交集
            const interStart = Math.max(startLev, tier.start);
            const interEnd = Math.min(targetLev, tier.end);
            
            if (interStart <= interEnd) {
                const levelsCount = interEnd - interStart + 1;
                const costForSegment = levelsCount * tier.unitPrice;
                totalCost += costForSegment;
            }
        }
        
        return totalCost;
    }

    // 主函数：更新界面
    function updateFee() {
        clearError();

        let startVal = parseInt(startInput.value, 10);
        let targetVal = parseInt(targetInput.value, 10);

        // 有效性检查
        if (isNaN(startVal)) {
            setError('❌ 起始等级必须是数字');
            return;
        }
        if (isNaN(targetVal)) {
            setError('❌ 目标等级必须是数字');
            return;
        }
        if (startVal < 1 || startVal > 55) {
            setError('起始等级范围必须为 1 ~ 55');
            return;
        }
        if (targetVal < 1 || targetVal > 55) {
            setError('目标等级范围必须为 1 ~ 55');
            return;
        }
        if (targetVal < startVal) {
            setError('目标等级不能低于起始等级，请调整');
            return;
        }

        const total = computePureUnitPrice(startVal, targetVal);
        // 确保非负
        const finalTotal = Math.max(0, total);
        totalSpan.innerText = finalTotal.toFixed(2);
    }

    // 重置为默认(起始1，目标55)
    function resetDefault() {
        startInput.value = '1';
        targetInput.value = '55';
        clearError();
        updateFee();
    }

    // 输入时边界限制
    function enforceLimits() {
        let s = parseInt(startInput.value, 10);
        if (!isNaN(s)) {
            if (s < 1) startInput.value = 1;
            if (s > 55) startInput.value = 55;
        }
        let t = parseInt(targetInput.value, 10);
        if (!isNaN(t)) {
            if (t < 1) targetInput.value = 1;
            if (t > 55) targetInput.value = 55;
        }
        updateFee();
    }

    // 事件绑定
    function bindEvents() {
        calcBtn.addEventListener('click', () => updateFee());
        resetBtn.addEventListener('click', () => resetDefault());
        startInput.addEventListener('input', enforceLimits);
        targetInput.addEventListener('input', enforceLimits);
        startInput.addEventListener('change', enforceLimits);
        targetInput.addEventListener('change', enforceLimits);
    }

    // 初始化
    bindEvents();
    updateFee();
</script>
</body>
</html>
